name: TchapX-ShareExtension
#--------------------------------------------------------------------------------
schemeTemplates:
  BaseScheme-ShareExtension:
    analyze:
      config: Debug
    archive:
      config: Release
    build:
      targets:
        TchapX-Production-ShareExtension:
        - running
        - testing
        - profiling
        - analyzing
        - archiving
    profile:
      config: Release
    run:
      askForAppToLaunch: true
      config: Debug
      debugEnabled: false
      disableMainThreadChecker: false
      launchAutomaticallySubstyle: 2
    test:
      config: Debug
      disableMainThreadChecker: false
#--------------------------------------------------------------------------------
schemes:
  TchapX-Production-ShareExtension:
    templates:
      - BaseScheme-ShareExtension
  TchapX-Staging-ShareExtension:
    templates:
      - BaseScheme-ShareExtension
  TchapX-Development-ShareExtension:
    templates:
      - BaseScheme-ShareExtension
#--------------------------------------------------------------------------------
targetTemplates:
  BaseTarget-ShareExtension:
    type: app-extension
    platform: iOS

    dependencies:
      - package: MatrixRustSDK
      - package: Collections
      - package: Compound
      - package: KeychainAccess

    info:
      properties:
        CFBundleDisplayName: $(PRODUCT_DISPLAY_NAME)
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        appGroupIdentifier: $(APP_GROUP_IDENTIFIER)
        baseBundleIdentifier: $(BASE_BUNDLE_IDENTIFIER)
        keychainAccessGroupIdentifier: $(KEYCHAIN_ACCESS_GROUP_IDENTIFIER)
        productionAppName: $(PRODUCTION_APP_NAME)
        NSExtension:
          NSExtensionPointIdentifier: com.apple.share-services
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).ShareExtensionViewController
          NSExtensionAttributes:
            IntentsSupported: [
              INSendMessageIntent,
            ]
            NSExtensionActivationRule:
              NSExtensionActivationSupportsFileWithMaxCount: 10
              NSExtensionActivationSupportsImageWithMaxCount: 10
              NSExtensionActivationSupportsMovieWithMaxCount: 10
              NSExtensionActivationSupportsText: true
              NSExtensionActivationSupportsWebURLWithMaxCount: 10

    entitlements:
      properties:
        com.apple.security.application-groups:
        - $(APP_GROUP_IDENTIFIER)
        keychain-access-groups:
        - $(KEYCHAIN_ACCESS_GROUP_IDENTIFIER)
        
    settings:
      BASE_APP_GROUP_IDENTIFIER: $(BASE_BUNDLE_IDENTIFIER)
      APP_GROUP_IDENTIFIER: group.$(BASE_APP_GROUP_IDENTIFIER)
      PRODUCT_DISPLAY_NAME: $(APP_DISPLAY_NAME)
      PRODUCT_BUNDLE_IDENTIFIER: ${BASE_BUNDLE_IDENTIFIER}.shareextension
      MARKETING_VERSION: $(MARKETING_VERSION)
      CURRENT_PROJECT_VERSION: $(CURRENT_PROJECT_VERSION)
      DEVELOPMENT_TEAM: $(DEVELOPMENT_TEAM)

    sources:
    - path: ../ShareExtension/Sources
    - path: ../ElementX/Sources/ShareExtension
    - path: ../ElementX/Sources/AppHooks/AppHooks.swift
    - path: ../ElementX/Sources/AppHooks/Hooks/TracingHook.swift
    - path: ../ElementX/Sources/AppHooks/Hooks/ClientBuilderHook.swift
    - path: ../ElementX/Sources/AppHooks/Hooks/RemoteSettingsHook.swift
    - path: ../Secrets/Secrets.swift
    - path: ../ElementX/Sources/Application/Settings
    - path: ../ElementX/Sources/Application/TargetConfiguration.swift
    - path: ../ElementX/Sources/Services/Keychain/KeychainController.swift
    - path: ../ElementX/Sources/Services/Keychain/KeychainControllerProtocol.swift
    - path: ../ElementX/Sources/Services/UserSession/RestorationToken.swift
    - path: ../ElementX/Sources/Services/UserSession/SessionDirectories.swift
    - path: ../ElementX/Sources/Other/Extensions/Bundle.swift
    - path: ../ElementX/Sources/Other/Extensions/Dictionary.swift
    - path: ../ElementX/Sources/Other/Extensions/FileManager.swift
    - path: ../ElementX/Sources/Other/Extensions/NSItemProvider.swift
    - path: ../ElementX/Sources/Other/Extensions/ProcessInfo.swift
    - path: ../ElementX/Sources/Other/Extensions/UIView.swift
    - path: ../ElementX/Sources/Other/Extensions/URL.swift
    - path: ../ElementX/Sources/Other/InfoPlistReader.swift
    - path: ../ElementX/Sources/Other/CurrentValuePublisher.swift
    - path: ../ElementX/Sources/Other/Logging
    - path: ../ElementX/Sources/UITests/UITestsScreenIdentifier.swift
#--------------------------------------------------------------------------------
targets:
#--------------------------------------------------------------------------------
  TchapX-Production-ShareExtension:
    templates: 
      - BaseTarget-ShareExtension

    info:
      path: production/SupportingFiles/Info.plist

    entitlements:
      path: production/SupportingFiles/ShareExtension.entitlements

    settings:
      BASE_BUNDLE_IDENTIFIER: fr.gouv.tchapx
      APP_DISPLAY_NAME: TchapX ShareExtension
      PRODUCT_NAME: TchapX-Production-ShareExtension
      CODE_SIGN_ENTITLEMENTS: TchapX-ShareExtension/production/SupportingFiles/ShareExtension.entitlements

    sources:
    - path: production/SupportingFiles
#--------------------------------------------------------------------------------
  TchapX-Staging-ShareExtension:
    templates: 
      - BaseTarget-ShareExtension

    info:
      path: staging/SupportingFiles/Info.plist

    entitlements:
      path: staging/SupportingFiles/ShareExtension.entitlements

    settings:
      BASE_BUNDLE_IDENTIFIER: fr.gouv.tchapx.staging
      APP_DISPLAY_NAME: TchapX-Staging ShareExtension
      PRODUCT_NAME: TchapX-Staging-ShareExtension
      CODE_SIGN_ENTITLEMENTS: TchapX-ShareExtension/staging/SupportingFiles/ShareExtension.entitlements

    sources:
    - path: staging/SupportingFiles
#--------------------------------------------------------------------------------
  TchapX-Development-ShareExtension:
    templates: 
      - BaseTarget-ShareExtension

    info:
      path: development/SupportingFiles/Info.plist

    entitlements:
      path: development/SupportingFiles/ShareExtension.entitlements

    settings:
      BASE_BUNDLE_IDENTIFIER: fr.gouv.tchapx.dev
      APP_DISPLAY_NAME: TchapX-Development ShareExtension
      PRODUCT_NAME: TchapX-Development-ShareExtension
      CODE_SIGN_ENTITLEMENTS: ShareExtension/development/SupportingFiles/ShareExtension.entitlements

    sources:
    - path: development/SupportingFiles