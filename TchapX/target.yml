name: TchapX
#--------------------------------------------------------------------------------
schemeTemplates:
  BaseScheme:
    analyze:
      config: Debug
    archive:
      config: Release
    build:
      targets:
        ${scheme_name}:
        - running
        - testing
        - profiling
        - analyzing
        - archiving
    profile:
      config: Release
    run:
      config: Debug
      environmentVariables:
        - variable: HTTPS_PROXY
          value: localhost:9090
          isEnabled: false
        - variable: UI_TESTS_SCREEN
          value: ""
          isEnabled: false
        - variable: RESET_APP_SETTINGS
          value: "true"
          isEnabled: false
    test:
      config: Debug
      gatherCoverageData: true
      coverageTargets:
        - ${scheme_name}:
#--------------------------------------------------------------------------------
schemes:
  TchapX-Production:
    templates:
      - BaseScheme
    test:
      testPlans:
        - path: UnitTests/SupportingFiles/UnitTests.xctestplan
          defaultPlan: true
        - path: UITests/SupportingFiles/UITests.xctestplan
          defaultPlan: false
        - path: PreviewTests/SupportingFiles/PreviewTests.xctestplan
          defaultPlan: false
  TchapX-Staging:
    templates:
      - BaseScheme
    test:
      testPlans:
        - path: UnitTests/SupportingFiles/UnitTests.xctestplan
          defaultPlan: true
        - path: UITests/SupportingFiles/UITests.xctestplan
          defaultPlan: false
        - path: PreviewTests/SupportingFiles/PreviewTests.xctestplan
          defaultPlan: false
  TchapX-Development:
    templates:
      - BaseScheme
    test:
      testPlans:
        - path: UnitTests/SupportingFiles/UnitTests.xctestplan
          defaultPlan: true
        - path: UITests/SupportingFiles/UITests.xctestplan
          defaultPlan: false
        - path: PreviewTests/SupportingFiles/PreviewTests.xctestplan
          defaultPlan: false
#--------------------------------------------------------------------------------
targetTemplates:
  BaseTarget:
    type: application
    platform: iOS

    info:
      properties:
        UILaunchScreen:
          UIColorName: colors/background-color
        CFBundleDisplayName: $(APP_DISPLAY_NAME)
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        CFBundleURLTypes: [
          {
            CFBundleTypeRole: Editor,
            CFBundleURLName: "Element Call",
            CFBundleURLSchemes: [
              io.element.call
            ]
          },
          {
            CFBundleTypeRole: Editor,
            CFBundleURLName: "Application",
            CFBundleURLSchemes: [
              $(BASE_BUNDLE_IDENTIFIER), # The app's own scheme for custom routes
              "matrix" # Matrix URI scheme for permalinks
            ]
          }
        ]
        UISupportedInterfaceOrientations: [
          UIInterfaceOrientationPortrait,
          UIInterfaceOrientationPortraitUpsideDown,
          UIInterfaceOrientationLandscapeLeft,
          UIInterfaceOrientationLandscapeRight
        ]
        appGroupIdentifier: $(APP_GROUP_IDENTIFIER)
        baseBundleIdentifier: $(BASE_BUNDLE_IDENTIFIER)
        keychainAccessGroupIdentifier: $(KEYCHAIN_ACCESS_GROUP_IDENTIFIER)
        productionAppName: $(PRODUCTION_APP_NAME)
        ITSAppUsesNonExemptEncryption: false
        NSUserActivityTypes: [
          INSendMessageIntent,
          INStartCallIntent,
        ]
        NSCameraUsageDescription: To take pictures or videos and send them as a message $(APP_DISPLAY_NAME) needs access to the camera.
        NSMicrophoneUsageDescription: To record and send messages with audio, $(APP_DISPLAY_NAME) needs to access the microphone.
        NSPhotoLibraryAddUsageDescription: This lets you save images and videos to your photo library.
        NSLocationWhenInUseUsageDescription: Grant location access so that $(APP_DISPLAY_NAME) can share your location.
        NSFaceIDUsageDescription: Face ID is used to access your app.
        UIBackgroundModes: [
          audio,
          fetch,
          processing,
          voip
        ]
        UTExportedTypeDeclarations:
        - UTTypeConformsTo: [public.text]
          UTTypeDescription: Mention Pills
          UTTypeIdentifier: $(PILLS_UT_TYPE_IDENTIFIER)
        CFBundleDocumentTypes:
        - CFBundleTypeName: Mention Pills
          CFBundleTypeRole: Viewer
          LSHandlerRank: Owner
          LSItemContentTypes: $(PILLS_UT_TYPE_IDENTIFIER)
        LSSupportsOpeningDocumentsInPlace: false
        
    entitlements:
      path: ElementX.entitlements
      properties:
        aps-environment: development
        com.apple.developer.associated-domains:
        - applinks:$(BASE_BUNDLE_IDENTIFIER)
        - applinks:www.$(BASE_BUNDLE_IDENTIFIER)
        - applinks:call.element.io
        - applinks:matrix.to
        # - applinks:localhost?mode=developer # developer mode only works with https (but self-signed is fine).
        - webcredentials:www.$(BASE_BUNDLE_IDENTIFIER)
        com.apple.developer.usernotifications.communication: true
        com.apple.security.app-sandbox: true
        com.apple.security.application-groups:
        - $(APP_GROUP_IDENTIFIER)
        com.apple.security.network.client: true
        keychain-access-groups:
        - $(KEYCHAIN_ACCESS_GROUP_IDENTIFIER)
        
    settings:
      BASE_APP_GROUP_IDENTIFIER: $(BASE_BUNDLE_IDENTIFIER)
      APP_GROUP_IDENTIFIER: group.$(BASE_APP_GROUP_IDENTIFIER)
      KEYCHAIN_ACCESS_GROUP_IDENTIFIER: "$(AppIdentifierPrefix)$(BASE_BUNDLE_IDENTIFIER)"
      PRODUCT_NAME: $(APP_NAME)
      PRODUCT_BUNDLE_IDENTIFIER: $(BASE_BUNDLE_IDENTIFIER)
      ASSETCATALOG_COMPILER_APPICON_NAME: TchapX-icon
      SWIFT_OBJC_BRIDGING_HEADER: ElementX/SupportingFiles/ElementX-Bridging-Header.h
      SWIFT_OBJC_INTERFACE_HEADER_NAME: GeneratedInterface-Swift.h
      PILLS_UT_TYPE_IDENTIFIER: $(BASE_BUNDLE_IDENTIFIER).pills

    preBuildScripts:
    - name: 🧙 Sourcery - Generate mocks
      runOnlyWhenInstalling: false
      basedOnDependencyAnalysis: false
      shell: /bin/sh
      script: |
        export PATH="$PATH:/opt/homebrew/bin"
        if which sourcery >/dev/null; then
            sourcery --config Tools/Sourcery/AutoMockableConfig.yml
        else
            echo "warning: Sourcery not installed, run swift run tools setup-project"
        fi

    postBuildScripts:
    - name: ⚠️ SwiftLint
      runOnlyWhenInstalling: false
      basedOnDependencyAnalysis: false
      shell: /bin/sh
      script: |
        export PATH="$PATH:/opt/homebrew/bin"
        if which swiftlint >/dev/null; then
            swiftlint
        else
            echo "warning: SwiftLint not installed, download from https://github.com/realm/SwiftLint"
        fi
    - name: 🧹 SwiftFormat
      runOnlyWhenInstalling: false
      basedOnDependencyAnalysis: false
      shell: /bin/sh
      script: |
        export PATH="$PATH:/opt/homebrew/bin"
        if which swiftformat >/dev/null; then
            swiftformat --lint --lenient "$PROJECT_DIR"
        else
            echo "warning: SwiftFormat not installed, download from https://github.com/nicklockwood/SwiftFormat"
        fi

    dependencies:
    - target: MatrixRustSDKMocks
    - package: MatrixRustSDK
      embed: true
    - package: Compound
    - package: Algorithms
    - package: AsyncAlgorithms
    - package: AnalyticsEvents
    - package: Collections
    - package: DeviceKit
    - package: EmbeddedElementCall
    - package: KeychainAccess
    - package: Kingfisher
    - package: KZFileWatchers
    - package: LoremSwiftum
    - package: LRUCache
    - package: MapLibre
    - package: PostHog
    - package: SwiftState
    - package: GZIP
    - package: Sentry
      products: 
        - Sentry
        - SentrySwiftUI
    - package: Version
    - package: Emojibase
    - package: WysiwygComposer
    - package: SwiftOGG
    - package: SwiftSoup
    - package: DSWaveformImage
      product: DSWaveformImageViews

    sources:
    - path: ../ElementX/Sources
      excludes:
        - Other/Extensions/XCTestCase.swift
        - Other/Extensions/XCUIElement.swift
    - path: ../Secrets/Secrets.swift
    - path: main/Sources
      excludes:
        - Other/Extensions/XCUIElement.swift
    - path: main/Resources
    - path: ../ElementX/Resources
    - path: ../ElementX/SupportingFiles/Settings.bundle
    - path: ../Tools/Scripts/Templates/SimpleScreenExample/ElementX

    # This is required for testing purposes... The problem with unit tests is that if you
    # try to `@testable import NSE` you can only get the definition of files, but due to a
    # limitation in how they work, they can only compile files that are part of the main test
    # target, so linking will fail. The solution is to just have the main app to reference the
    # extension code, and test it directly.
    - path: ../NSE/Sources

#--------------------------------------------------------------------------------
targets:
#--------------------------------------------------------------------------------
  TchapX-Production:
    templates: 
      - BaseTarget

    configFiles:
      Debug: production/SupportingFiles/secrets.xcconfig
      Release: production/SupportingFiles/secrets.xcconfig

    info:
      path: production/SupportingFiles/Info.plist
      properties:
        BGTaskSchedulerPermittedIdentifiers: [
          fr.gouv.tchapx.background.refresh
        ]
        # Data generated from Tchap Android `certignaservicesrootca.cer` embedded certificate.
        # Certificate of a website can be obtained as follow: ex +'/BEGIN CERTIFICATE/,/END CERTIFICATE/p' <(echo | openssl s_client -showcerts -connect tchap.gouv.fr:443) -scq > tchap.gouv.fr.crt
        # Generate PEM: openssl x509 -inform der -in certignaservicesrootca.cer -out certignaservicesrootca.pem
        # Generate SPKI: cat certignaservicesrootca.pem | openssl x509 -inform pem -noout -outform pem -pubkey | openssl pkey -pubin -inform pem -outform der | openssl dgst -sha256 -binary | openssl enc -base64
        NSAppTransportSecurity: {
          NSPinnedDomains: {
            "tchap.gouv.fr": {
              NSIncludesSubdomains: true,
              NSPinnedCAIdentities: [
                "SPKI-SHA256-BASE64": "5JA76xhFakdvHHlo2H5FqC3Ixf5HGrLq6YkNn7JDMeU=",
                "PEM": "-----BEGIN CERTIFICATE----------END CERTIFICATE-----"
             ]
            },
            "openmaptiles.geo.data.gouv.fr": {
              NSIncludesSubdomains: true,
              NSPinnedCAIdentities: [
                "SPKI-SHA256-BASE64": "5JA76xhFakdvHHlo2H5FqC3Ixf5HGrLq6YkNn7JDMeU=",
                "PEM": "-----BEGIN CERTIFICATE----------END CERTIFICATE-----"
             ]
            }
          }
        }

    entitlements:
      path: production/SupportingFiles/tchapx.entitlements

    settings:
      BASE_BUNDLE_IDENTIFIER: fr.gouv.tchapx
      PRODUCTION_APP_NAME: TchapX PRODUCTION
      APP_NAME: TchapX-Production
      APP_DISPLAY_NAME: Tchap X # The name used in the application.
      CODE_SIGN_ENTITLEMENTS: TchapX/production/SupportingFiles/tchapx.entitlements
      OTHER_SWIFT_FLAGS: $(inherited) -D IS_MAIN_APP -D IS_TCHAP_PRODUCTION

    preBuildScripts:
    - name: 🛠 SwiftGen
      runOnlyWhenInstalling: false
      basedOnDependencyAnalysis: false
      shell: /bin/sh
      script: |
        export PATH="$PATH:/opt/homebrew/bin"
        if which swiftgen >/dev/null; then
            swiftgen config run --config Tools/SwiftGen/swiftgen-config.yml
            swiftgen config run --config "Tools/SwiftGen/swiftgen-config-tchap-main.yml"
            # inject Xcode target into switgen-config-tchap yaml file.
            source_file="Tools/SwiftGen/swiftgen-config-tchap-target.yml"
            target_file="Tools/SwiftGen/swiftgen-config-tchap-target.tmp"
            scheme="production"
            rm -f $target_file
            sed "s/%TARGET%/${scheme}/" $source_file > $target_file
            swiftgen config run --config $target_file
            rm -f $target_file
        else
            echo "warning: SwiftGen not installed, download from https://github.com/SwiftGen/SwiftGen"
        fi

    dependencies:
    - target: TchapX-Production-NSE
    - target: TchapX-Production-ShareExtension

    sources:
    - path: production/Resources
    - path: production/SupportingFiles
      excludes:
        - target.yml
        - NSE
